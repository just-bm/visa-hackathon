services:
  # ── React Frontend (nginx) ────────────────────────────────
  client:
    container_name: visa-client
    build:
      context: ./client
      dockerfile: Dockerfile.client
    ports:
      - "80:80"
    env_file:
      - ./client/.env
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visa-network

  # ── Express API Server ────────────────────────────────────
  server:
    container_name: visa-server
    build:
      context: ./server
      dockerfile: Dockerfile.server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      ai-services:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - visa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI AI Service ────────────────────────────────────
  ai-services:
    container_name: visa-ai-services
    build:
      context: ./ai-services
      dockerfile: Dockerfile.ai-services
    ports:
      - "8000:8000"
    env_file:
      - ./ai-services/.env
    restart: unless-stopped
    networks:
      - visa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Shared Network ──────────────────────────────────────────
networks:
  visa-network:
    driver: bridge